<!DOCTYPE html>
<html lang="pt-br">

<head>
       <meta charset="UTF-8">
       <meta name="viewport" content="width=device-width, initial-scale=1.0">
       <title>Formulário</title>

       <style>
              * {
                     font-family: 'Times New Roman', Times, serif;
              }
       </style>
</head>

<body>
      

       <form>
     
            <ul>  
              <h1>Preencha seus dados</h1>

                     <b><p><i>Digite seu nome:</i></p></b>
                     <input type="text" placeholder="Seu nome aqui" id="Campo_Nome"> 
                     <br>
                     <br>
                     <b><p><i>Sua idade:</i></p></b>
                     <input type="number"placeholder="15-70" id="Campo_Nome">
                     
                                   <br> <br>

              <h2>Atividade física preferida</h2>
              <h3>Selecione uma das opções abaixo:</h3>
              
              <input type="radio" name="atividade_fisica" id="caminhar" value="1">
              <label for="caminhar"> Caminhada </label> 
              <br>
              <input type="radio" name="atividade_fisica" id="corrida" value="2">
              <label for="corrida"> Correr </label>
              <br>
              <input type="radio" name= "atividade_fisica" id="dança" value="3">
              <label for="dança"> Dançar </label>
              <br>
              <input type="radio" name="atividade_fisica" id="nadar" value="4">
              <label for="Natação"> Nadar </label>
              
              <br><br>

              <h4>Escreva um breve comentário sobre sua experiência com a atividade escolhida.</h4>

              <input type="text" placeholder="Digite aqui sua resposta..." id="resposta">
              <br> <br>
              <button type="submit">Enviar resposta</button>
           </ul>
       </form>




</body>

</html>
